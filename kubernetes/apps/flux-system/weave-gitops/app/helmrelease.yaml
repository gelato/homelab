---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weave-gitops
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: weaveworks
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    image:
      # FIXME check the app name
      # repository: ghcr.io/weaveworks/wego-app
      repository: ghcr.io/gkalian/wego-app
      pullPolicy: IfNotPresent
      tag: "v0.39.1-rc.1@sha256:1f2043b807a67936ba054dd61f200f81df2bd8557139b07f85b4738144a481dc"
    adminUser:
      create: true
      username: admin
      passwordHash: ${WW_ADMIN_PASSWORD}
    networkPolicy:
      create: false
    metrics:
      enabled: true
    rbac:
      create: true
      impersonationResourceNames: ["admin"]
      additionalRules:
        - apiGroups: ["infra.contrib.fluxcd.io"]
          resources: ["terraforms"]
          verbs: ["get", "list", "patch"]
    resources:
      requests:
        cpu: 100m
        memory: 500Mi
        ephemeral-storage: 100Mi
      limits:
        memory: 1Gi
        ephemeral-storage: 2Gi